name: Build and Push to GHCR

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Docker image name (defaults to github.repository)'
        required: false
        type: string
        default: ''
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: 'Dockerfile'
      context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      platforms:
        description: 'Comma-separated target platforms (e.g. linux/amd64,linux/arm64)'
        required: false
        type: string
        default: 'linux/amd64'
      push_latest:
        description: 'Also tag and push as :latest'
        required: false
        type: boolean
        default: false
      build_args:
        description: 'Newline-separated list of build args (KEY=VALUE)'
        required: false
        type: string
        default: ''
    secrets:
      GH_TOKEN:
        required: true
    outputs:
      image:
        description: 'Full image reference (ghcr.io/owner/repo:sha-...)'
        value: ${{ jobs.build-push.outputs.image }}
      tags:
        description: 'All generated tags (newline-separated)'
        value: ${{ jobs.build-push.outputs.tags }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags && steps.primary_tag.outputs.tag || '' }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Resolve image name
        id: image
        run: |
          NAME="${{ inputs.image_name }}"
          if [ -z "$NAME" ]; then
            NAME="${{ github.repository }}"
          fi
          echo "name=ghcr.io/${NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable=${{ inputs.push_latest }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output primary tag
        id: primary_tag
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
