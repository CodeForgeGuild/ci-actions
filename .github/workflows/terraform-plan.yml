name: Terraform Plan

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'Directory where Terraform files are located'
        required: false
        type: string
        default: '.'
      terraform_version:
        description: 'Terraform version to use'
        required: false
        type: string
        default: 'latest'
      environment:
        description: 'Deployment environment (used for var-file selection)'
        required: false
        type: string
        default: ''
    secrets:
      WIF_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Format check
        id: fmt
        working-directory: ${{ inputs.working_directory }}
        run: terraform fmt -check -recursive -no-color
        continue-on-error: true

      - name: Terraform Init
        id: init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init -no-color

      - name: Terraform Validate
        id: validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate -no-color

      - name: Resolve var-file flag
        id: varfile
        run: |
          ENV="${{ inputs.environment }}"
          FLAG=""
          if [ -n "$ENV" ] && [ -f "${{ inputs.working_directory }}/${ENV}.tfvars" ]; then
            FLAG="-var-file=${ENV}.tfvars"
          fi
          echo "flag=$FLAG" >> "$GITHUB_OUTPUT"

      - name: Terraform Plan
        id: plan
        working-directory: ${{ inputs.working_directory }}
        run: terraform plan -no-color ${{ steps.varfile.outputs.flag }} 2>&1 | tee /tmp/plan.txt
        continue-on-error: true

      - name: Truncate plan output if too large
        run: |
          MAX=60000
          if [ "$(wc -c < /tmp/plan.txt)" -gt "$MAX" ]; then
            head -c "$MAX" /tmp/plan.txt > /tmp/plan-trunc.txt
            echo -e "\n... (output truncated)" >> /tmp/plan-trunc.txt
            mv /tmp/plan-trunc.txt /tmp/plan.txt
          fi

      - name: Build plan comment
        run: |
          {
            echo "## Terraform Plan"
            echo ""
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Format | ${{ steps.fmt.outcome == 'success' && '✅' || '⚠️ check fmt' }} |"
            echo "| Init | ${{ steps.init.outcome == 'success' && '✅' || '❌' }} |"
            echo "| Validate | ${{ steps.validate.outcome == 'success' && '✅' || '❌' }} |"
            echo "| Plan | ${{ steps.plan.outcome == 'success' && '✅' || '❌' }} |"
            echo ""
            echo "<details><summary>Plan output</summary>"
            echo ""
            echo '```hcl'
            cat /tmp/plan.txt
            echo '```'
            echo ""
            echo "</details>"
          } > /tmp/plan-comment.md

      - name: Post plan comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: "terraform-plan"
          path: /tmp/plan-comment.md

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
